apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: pg-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg-charts
        namespace: pg-system
  targetNamespace: pg-system
  values:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
    monitoring:
      podMonitor: true
