---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pg-system
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./clusters/homelab/pg-system
  prune: true
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: pg-system
  timeout: 3m0s
  wait: true
